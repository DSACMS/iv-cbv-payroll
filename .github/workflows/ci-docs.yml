name: CI Documentation Checks

on:
  push:
    branches: [ main ]
    paths:
      - '**/*.md'
      - 'docs/api/schemas/*.json'
  pull_request:
    paths:
      - '**/*.md'
      - 'docs/api/schemas/*.json'

permissions:
  contents: read

jobs:
  lint-markdown:
    name: Lint markdown
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      # This is the GitHub Actions-friendly port of the linter used in the Makefile.
      - uses: tcort/github-action-markdown-link-check@v1.1.2
        with:
          use-quiet-mode: "yes" # errors only.
          config-file: ".github/workflows/markdownlint-config.json"
  validate-json-schemas:
    name: Validate JSON Schemas
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ruby/setup-ruby@v1
        with:
          working-directory: app
          bundler-cache: true
      - run: ruby bin/validate-json-schemas
        working-directory: app
