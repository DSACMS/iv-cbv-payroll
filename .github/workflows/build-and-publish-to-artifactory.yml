name: Build and publish
run-name: Build and publish to CMS ${{ inputs.app_name }}:${{ inputs.ref }}

on:
  workflow_call:
    inputs:
      app_name:
        description: "name of application folder under infra directory"
        required: true
        type: string
      ref:
        description: The branch, tag or SHA to checkout. When checking out the repository that triggered a workflow, this defaults to the reference or SHA for that event. Otherwise, use branch or tag that triggered the workflow run.
        required: true
        type: string
  workflow_dispatch:
    inputs:
      app_name:
        description: "name of application folder under infra directory"
        required: true
        type: string
      ref:
        description: The branch, tag or SHA to checkout. When checking out the repository that triggered a workflow, this defaults to the reference or SHA for that event. Otherwise, use branch or tag that triggered the workflow run.
        required: true
        type: string

jobs:
  get-commit-hash:
    name: Get commit hash
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      commit_hash: ${{ steps.get-commit-hash.outputs.commit_hash }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}
      - name: Get commit hash
        id: get-commit-hash
        run: |
          COMMIT_HASH=$(git rev-parse ${{ inputs.ref }})
          echo "Commit hash: $COMMIT_HASH"
          echo "commit_hash=$COMMIT_HASH" >> "$GITHUB_OUTPUT"
  build-and-publish:
    name: Build and publish
    runs-on: ubuntu-latest
    needs: get-commit-hash
    concurrency: ${{ github.workflow }}-${{ needs.get-commit-hash.outputs.commit_hash }}

    permissions:
      contents: read
      id-token: write

    env:
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
      ARTIFACTORY_SECRET_ARN: ${{ vars.ARTIFACTORY_SECRET_ARN }}
      EMMY_IMAGE_REPO: ${{ vars.EMMY_IMAGE_REPO }}

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}

      - name: Set up Terraform
        uses: ./.github/actions/setup-terraform

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials
        uses: ./.github/actions/configure-aws-credentials
        with:
          app_name: ${{ inputs.app_name }}
          environment: shared

      - name: Get ECR repository URL
        id: get-ecr-repo
        shell: bash
        run: |
          terraform -chdir="infra/${{ inputs.app_name }}/app-config" init > /dev/null
          terraform -chdir="infra/${{ inputs.app_name }}/app-config" apply -auto-approve > /dev/null
          repository_url=$(terraform -chdir="infra/${{ inputs.app_name }}/app-config" output -json build_repository_config | jq -r ".repository_url")
          echo "repository_url=$repository_url" >> "$GITHUB_OUTPUT"

      - name: Login to Artifactory
        if: env.ARTIFACTORY_SECRET_ARN != '' && env.EMMY_IMAGE_REPO != ''
        shell: bash
        run: |
          secret=$(aws secretsmanager get-secret-value --secret-id "${{ env.ARTIFACTORY_SECRET_ARN }}" --query SecretString --output text)
          username=$(echo "$secret" | jq -r .username)
          password=$(echo "$secret" | jq -r .password)
          echo "$password" | docker login "${{ env.EMMY_IMAGE_REPO }}" --username "$username" --password-stdin

      - name: Login to ECR
        shell: bash
        run: |
          aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login --username AWS --password-stdin ${{ steps.get-ecr-repo.outputs.repository_url }}

      - name: Check if image is already published
        id: check-image-published
        shell: bash
        run: |
          # For Artifactory, we might need a different way to check if image is published.
          # For now, we'll default to false if not ECR, or use a custom check.
          # Assuming we want to use the same logic if possible, but bin/is-image-published is ECR specific.
          if [[ "${{ env.EMMY_IMAGE_REPO }}" == *".dkr.ecr."* ]] || [[ -z "${{ env.EMMY_IMAGE_REPO }}" ]]; then
            is_image_published=$(./bin/is-image-published "${{ inputs.app_name }}" "${{ inputs.ref }}")
          else
            # TODO: Implement Artifactory image check if needed. For now, assume false to force build/publish.
            is_image_published="false"
          fi
          echo "Is image published: $is_image_published"
          echo "is_image_published=$is_image_published" >> "$GITHUB_OUTPUT"

      - name: Build and push release
        if: steps.check-image-published.outputs.is_image_published == 'false'
        shell: bash
        run: |
          IMAGE_NAME=$(make APP_NAME=${{ inputs.app_name }} release-image-name)
          IMAGE_TAG=$(make APP_NAME=${{ inputs.app_name }} release-image-tag)
          
          TAGS="--tag ${{ steps.get-ecr-repo.outputs.repository_url }}:${IMAGE_TAG} --tag ${{ steps.get-ecr-repo.outputs.repository_url }}:latest"
          
          if [[ -n "${{ env.EMMY_IMAGE_REPO }}" ]]; then
            ARTIFACTORY_IMAGE="${{ env.EMMY_IMAGE_REPO }}/${IMAGE_NAME}:${IMAGE_TAG}"
            TAGS="${TAGS} --tag ${ARTIFACTORY_IMAGE}"
          fi
          
          make APP_NAME=${{ inputs.app_name }} release-build OPTS="--push ${TAGS}"
