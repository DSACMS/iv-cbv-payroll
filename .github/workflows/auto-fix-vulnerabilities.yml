name: Auto-fix Dockerfile OS Vulnerabilities

on:
  workflow_run:
    workflows: ["CI Vulnerability Scans"]
    types: [completed]
  workflow_dispatch:
  schedule:
    - cron: '0 9 * * *' # Daily 9am UTC
  # Temporary: allows testing from a feature branch before merging to main.
  # Remove this trigger once the workflow has been validated on main.
  pull_request:
    paths:
      - .github/workflows/auto-fix-vulnerabilities.yml
      - .github/scripts/patch-dockerfile.py

# Prevent parallel runs from creating conflicting Dockerfile edits or duplicate PRs.
concurrency:
  group: auto-fix-vulnerabilities
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  patch-dockerfile:
    name: Patch Dockerfile OS vulnerabilities
    runs-on: ubuntu-latest
    # For workflow_run: only run when the triggering workflow failed.
    # For workflow_dispatch and schedule: always run.
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'schedule' ||
      github.event_name == 'pull_request' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'failure')

    env:
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

    steps:
      - name: Generate branch timestamp
        id: timestamp
        run: echo "value=$(date -u +%Y%m%d-%H%M%S)" >> "$GITHUB_OUTPUT"

      - name: Determine reviewer
        id: reviewer
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            # Tag the person whose push/PR triggered the failing CI run
            echo "login=${{ github.event.workflow_run.actor.login }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            # Tag whoever manually triggered this workflow
            echo "login=${{ github.actor }}" >> "$GITHUB_OUTPUT"
          else
            # Scheduled run — no specific person to tag
            echo "login=" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        if: env.DOCKERHUB_TOKEN != '' && github.event.pull_request.head.repo.full_name == github.repository
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Build Docker image for scanning
        id: build-image
        run: |
          make APP_NAME=app release-build
          IMAGE_NAME=$(make APP_NAME=app release-image-name)
          IMAGE_TAG=$(make release-image-tag)
          echo "image=$IMAGE_NAME:$IMAGE_TAG" >> "$GITHUB_OUTPUT"

      - name: Run Trivy scan (JSON output)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: image
          image-ref: ${{ steps.build-image.outputs.image }}
          format: json
          output: trivy-results.json
          exit-code: 0 # Don't fail here — we process results below
          severity: 'HIGH,CRITICAL'
          ignore-unfixed: true
          vuln-type: os
          scanners: vuln

      - name: Patch Dockerfile with fixable OS packages
        env:
          PATCH_SUMMARY_FILE: patch-summary.md
        run: ruby .github/scripts/patch-dockerfile.rb trivy-results.json app/Dockerfile

      - name: Generate PR body
        env:
          EVENT_NAME: ${{ github.event_name }}
          TRIGGER_RUN_URL: ${{ github.event.workflow_run.html_url }}
          TRIGGER_RUN_TITLE: ${{ github.event.workflow_run.display_title }}
          TRIGGER_PR_NUMBER: ${{ github.event.workflow_run.pull_requests[0].number }}
        run: |
          {
            echo "## Automated Dockerfile OS Vulnerability Fix"
            echo ""
            if [ "$EVENT_NAME" = "workflow_run" ]; then
              echo "| | |"
              echo "|---|---|"
              echo "| **Failed scan** | [${TRIGGER_RUN_TITLE}](${TRIGGER_RUN_URL}) |"
              if [ -n "$TRIGGER_PR_NUMBER" ] && [ "$TRIGGER_PR_NUMBER" != "null" ]; then
                echo "| **Source PR** | #${TRIGGER_PR_NUMBER} |"
              fi
            else
              echo "**Triggered by:** manual \`${EVENT_NAME}\`"
            fi
            echo ""
            echo "Trivy identified OS packages with available CVE fixes. The auto-managed"
            echo "\`RUN apt-get install\` block in the Dockerfile BASE stage has been updated:"
            echo ""
            cat patch-summary.md
            echo "---"
            echo ""
            echo "> [!IMPORTANT]"
            echo "> **Trigger CI before merging.** This PR was opened by an automated workflow."
            echo "> GitHub does not run CI on \`GITHUB_TOKEN\`-created PRs automatically."
            echo "> To run \`CI Vulnerability Scans\`:"
            echo "> 1. Click **Close pull request** at the bottom of this page"
            echo "> 2. Click **Reopen pull request**"
            echo ""
            echo "Once CI passes and confirms Trivy/Anchore are green, this PR is safe to merge."
            echo ""
            echo "_The auto-fix block in the Dockerfile is temporary — remove it when the base_"
            echo "_Ruby image is next upgraded to a version that includes these fixes (see upgrade_"
            echo "_instructions at the top of the Dockerfile)._"
          } > pr-body.md

      - name: Check for existing open fix PR
        id: check-existing-pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXISTING=$(gh pr list \
            --repo "$GITHUB_REPOSITORY" \
            --label security \
            --state open \
            --json number,headRefName \
            --jq '[.[] | select(.headRefName | startswith("auto-fix/dockerfile-os-vulnerabilities"))] | first | .number')
          if [ -n "$EXISTING" ] && [ "$EXISTING" != "null" ]; then
            echo "Open fix PR #$EXISTING already exists — skipping creation."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create or update fix PR
        if: steps.check-existing-pr.outputs.skip != 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          add-paths: app/Dockerfile
          branch: auto-fix/dockerfile-os-vulnerabilities-${{ steps.timestamp.outputs.value }}
          base: main
          delete-branch: false
          title: 'fix: patch Dockerfile for OS-level CVEs flagged by Trivy/Anchore'
          labels: security
          body-path: pr-body.md
          reviewers: ${{ steps.reviewer.outputs.login }}
          commit-message: 'fix: patch Dockerfile for OS-level CVEs flagged by Trivy/Anchore'
