name: rspec tests

on:
  pull_request:
    paths: ['app/**']

permissions:
  contents: read

jobs:
  rspec:
    name: Rspec
    runs-on: ubuntu-22.04
    services:
      postgres:
        image: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports: ["5432:5432"]
        env:
          POSTGRES_DB: iv_cbv_payroll_test
          POSTGRES_USER: cidbuser
          POSTGRES_PASSWORD: postgres

    steps:
      - uses: actions/checkout@v6

      - id: setup
        uses: ./.github/actions/setup-project
        with:
          rails_env: test

      - name: Set up parallel test databases
        working-directory: app
        env:
          RAILS_ENV: test
          DB_HOST: localhost
          DB_USERNAME: cidbuser
          DB_PASSWORD: postgres
        run: |
          bundle exec rake parallel:create[4]
          bundle exec rake parallel:load_schema[4]

      - name: Run rspec (in-job parallel, 4 processes)
        working-directory: app
        env:
          RAILS_ENV: test
          DB_HOST: localhost
          DB_USERNAME: cidbuser
          DB_PASSWORD: postgres
          RAILS_MASTER_KEY: 0f5db7adba61669d4cc45dfa6b2464d7
        run: |
          bundle exec parallel_test spec/ \
            --type rspec \
            -n 4 \
            --exclude-pattern '^spec/e2e/'
