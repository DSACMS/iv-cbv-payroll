# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
repos:
- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: v3.2.0
  hooks:
  - id: trailing-whitespace
  - id: end-of-file-fixer
  - id: check-yaml

- repo: local
  hooks:
  - id: rubocop
    name: rubocop
    entry: bin/run-linter --cd app -- bundle exec rubocop --autocorrect --force-exclusion
    language: ruby
    files: '^app/(.*\.rb|.rubocop.*\.yml)$'

  - id: erblint
    name: erblint
    entry: bin/run-linter --cd app -- bundle exec erb_lint --autocorrect
    language: ruby
    files: '^app/.*\.erb$'

  - id: i18n-unused
    name: i18n-unused
    entry: bin/run-linter --cd app -- bundle exec i18n-tasks unused
    language: ruby
    files: '^app/config/locales/.*\.yml$'
    pass_filenames: false

  - id: i18n-normalize
    name: i18n-normalize
    entry: bin/run-linter --cd app -- bundle exec i18n-tasks normalize
    language: ruby
    files: '^app/config/locales/.*\.yml$'
    pass_filenames: false

  - id: shellcheck
    name: shellcheck
    entry: shellcheck
    language: system        # installed via `brew bundle`
    files: '^bin/.*$'

  - id: prettier
    name: prettier
    entry: bin/run-linter --cd app -- npm run format:precommit
    language: node
    files: '^app/.*\.(js|ts|json)$'

  - id: terraform_fmt
    name: Terraform Fmt
    entry: terraform fmt
    language: system
    files: 'infra/.*\.tf$'

  - id: checkov
    name: Checkov
    entry: checkov --quiet --output sarif --framework terraform -f
    language: system
    files: 'infra/.*\.tf$'

  - id: hadolint
    name: Hadolint
    entry: hadolint
    language: system
    files: '.*/Dockerfile'

  - id: patch-dockerfile-test
    name: patch-dockerfile.rb test
    entry: ruby .github/scripts/patch-dockerfile_test.rb
    language: system
    files: '^(\.github/scripts/patch-dockerfile.*\.rb|app/Dockerfile)$'
    pass_filenames: false

  - id: actionlint
    name: ActionLint
    entry: actionlint
    language: system
    files: '^.github/.*\.yml$'
    pass_filenames: false

  - id: markdown_link_check
    name: MarkdownLinkCheck
    entry: npx markdown-link-check --config .github/workflows/markdownlint-config.json
    language: system
    files: '.*\.md$'

  # ── AI-assisted security review ──────────────────────────────────────────
  - id: code-security
    name: AI-assisted code security review
    language: script
    entry: .skills/code-security/scripts/code-security-hook-dispatcher.sh
    types: []
    pass_filenames: false
    always_run: true
    verbose: true
    stages: [pre-commit]

  - id: iac-compliance
    name: AI-assisted IaC compliance review (CMS ARS 5.1 / NIST 800-53 Rev 5)
    language: script
    entry: .skills/iac-compliance/scripts/iac-compliance-hook-dispatcher.sh
    types: []
    files: >-
      (?x)^(
        .*\.tf$|
        .*\.tfvars$|
        .*\.tf\.json$|
        .*\.bicep$|
        .*\.bicepparam$|
        .*\.hcl$|
        .*\.template\.json$|
        .*\.template\.ya?ml$|
        .*\.ya?ml$|
        cdk\.json$|
        Pulumi\.ya?ml$
      )$
    pass_filenames: false
    always_run: false
    verbose: true
    stages: [pre-commit]

  - id: skills-in-sync
    name: Skill files in sync across AI-tool locations
    language: script
    entry: scripts/sync-skills.sh
    args: ['--check']
    files: >-
      (?x)^(
        \.skills/[^/]+/SKILL\.md$|
        \.claude/skills/[^/]+/SKILL\.md$|
        \.codex/skills/[^/]+/SKILL\.md$|
        \.github/copilot/skills/[^/]+/SKILL\.md$
      )$
    pass_filenames: false
    always_run: false
    verbose: true
    stages: [pre-commit]
